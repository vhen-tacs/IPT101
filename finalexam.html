<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IPT 101 - Creators Portfolio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --text: #1f2937;
            --text-light: #4b5563;
            --border: #e5e7eb;
            --transition: all 0.3s ease;
        }

        @keyframes flip {
            0% { transform: rotateY(0deg); }
            100% { transform: rotateY(360deg); }
        }

        @keyframes shine {
            0% { transform: translateX(-200%) skewX(-30deg); opacity: 0; }
            50% { opacity: 0.5; }
            100% { transform: translateX(200%) skewX(-30deg); opacity: 0; }
        }

        nav {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            background: rgba(249, 250, 251, 0.95);
            backdrop-filter: blur(8px);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 30px;
            z-index: 1000;
            border-bottom: 1px solid var(--border);
        }

        .creators {
            font-weight: 700;
            font-size: 1.3rem;
            color: var(--text);
            letter-spacing: 0.5px;
        }

        .menu-content {
            display: flex;
            gap: 25px;
        }

        .menu-content a {
            color: var(--text-light);
            text-decoration: none;
            font-weight: 500;
            transition: var(--transition);
        }

        .menu-content a:hover {
            color: #4f46e5;
        }

        /* Coin Component Styles */
        .coin-scene {
            perspective: 1000px;
            margin-bottom: 2rem;
        }

        .coin {
            width: 200px;
            height: 200px;
            position: relative;
            transform-style: preserve-3d;
            animation: flip 6s linear infinite;
        }

        .coin-side {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            border: 6px solid #ffd700;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.6);
        }

        .reflection-layer {
            position: absolute;
            inset: 0;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4) 45%, rgba(255,255,255,0.6) 50%, rgba(255,255,255,0.4) 55%, transparent);
            width: 100%;
            height: 100%;
            z-index: 10;
            animation: shine 3s ease-in-out infinite;
        }

        .coin-back {
            background: #111;
            transform: rotateY(180deg);
        }

        /* Page Layout */
        .profiles-container {
            display: flex;
            justify-content: center;
            gap: 100px;
            padding: 150px 20px 100px;
            flex-wrap: wrap;
        }

        .profile-card {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }

        h2 {
            font-size: 2rem;
            font-weight: 800;
            color: var(--text);
            margin-top: 1rem;
        }
    </style>
</head>
<body class="bg-gray-50">
    <nav>
        <div class="creators text-indigo-600">Vincent & Francis</div>
        <div class="menu-content">
            <a href="#home">Home</a>
            <a href="#about">About</a>
            <a href="#contact">Contact</a>
        </div>
    </nav>

    <main class="profiles-container">
        <!-- Vincent's Profile -->
        <section class="profile-card">
            <div class="coin-scene">
                <div class="coin">
                    <div class="coin-side">
                        <div class="reflection-layer"></div>
                        <img src="https://via.placeholder.com/300?text=Vincent" alt="Vincent" class="object-cover w-full h-full">
                    </div>
                    <div class="coin-side coin-back">
                        <div class="reflection-layer" style="animation-delay: 3s;"></div>
                        <span class="text-yellow-500 font-bold text-5xl">V</span>
                    </div>
                </div>
            </div>
            <h2>Vincent</h2>
            <p class="text-gray-500 mt-2">Frontend Developer</p>
        </section>

        <!-- Francis's Profile -->
        <section class="profile-card">
            <div class="coin-scene">
                <div class="coin" style="animation-delay: -3s;">
                    <div class="coin-side">
                        <div class="reflection-layer"></div>
                        <img src="https://via.placeholder.com/300?text=Francis" alt="Francis" class="object-cover w-full h-full">
                    </div>
                    <div class="coin-side coin-back">
                        <div class="reflection-layer" style="animation-delay: 0s;"></div>
                        <span class="text-yellow-500 font-bold text-5xl">F</span>
                    </div>
                </div>
            </div>
            <h2>Francis</h2>
            <p class="text-gray-500 mt-2">UI Designer</p>
        </section>
    </main>
</body>
</html>
